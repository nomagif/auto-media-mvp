# touch for GitHub Actions recognition
name: Deploy static observatory site

on:
  push:
    branches:
      - main
    paths:
      - 'projects/auto-media-mvp/**'
      - '.github/workflows/deploy-static-site.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '22'
  SITE_BASE_PATH: /auto-media-mvp

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-auto-media-mvp
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/auto-media-mvp
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: projects/auto-media-mvp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        run: npm run site:build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: projects/auto-media-mvp/site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
