<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weekly JSON Snapshot Cover</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: rgba(17, 24, 39, 0.88);
      --line: #243041;
      --text: #ffffff;
      --muted: #94a3b8;
      --accent: #22c55e;
      --accent2: #7dd3fc;
    }
    * { box-sizing: border-box; }
    html, body {
      width: 1200px;
      height: 1200px;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at top left, rgba(139, 92, 246, 0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.16), transparent 28%),
        var(--bg);
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }
    .frame {
      width: 100%;
      height: 100%;
      padding: 140px;
      position: relative;
    }
    .grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(125, 211, 252, 0.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(125, 211, 252, 0.06) 1px, transparent 1px);
      background-size: 52px 52px;
      mask-image: radial-gradient(circle at center, rgba(0,0,0,.8), transparent 78%);
    }
    .panel {
      position: relative;
      width: 920px;
      height: 700px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: var(--panel);
      padding: 72px;
      box-shadow: 0 30px 80px rgba(0,0,0,.32);
    }
    .eyebrow {
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .12em;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 84px;
    }
    .title {
      font-size: 112px;
      line-height: .95;
      font-weight: 800;
      margin: 0;
      letter-spacing: -0.04em;
    }
    .subtitle {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 72px;
      color: var(--muted);
      font-size: 34px;
      line-height: 1.35;
      font-weight: 500;
    }
    .accent-line {
      position: absolute;
      left: 72px;
      right: 72px;
      bottom: 150px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), transparent);
      opacity: .7;
    }
  </style>
</head>
<body>
  <div class="frame">
    <div class="grid"></div>
    <div class="panel">
      <div class="eyebrow">AI / Macro Observatory</div>
      <h1 class="title">Weekly JSON<br />Snapshot</h1>
      <div class="accent-line"></div>
      <div class="subtitle">Structured ranking data for analysts and automation</div>
    </div>
  </div>
</body>
</html>
